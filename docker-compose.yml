services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_auth_system_prod
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "ecto://postgres:postgres@db/my_auth_system_prod"
      PHX_HOST: "localhost"
      PHX_SERVER: "true"
      PORT: "4000"
      SECRET_KEY_BASE: "your-secret-key-base-min-64-chars-change-in-production-abcdef123456"
      GUARDIAN_SECRET_KEY: "your-guardian-secret-change-in-production"
      BREVO_API_KEY: "${BREVO_API_KEY}"
      BREVO_SENDER_NAME: "MyAuth System"
      BREVO_SENDER_EMAIL: "noreply@myauthsystem.com"
      MIX_ENV: "prod"
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  postgres_data:
